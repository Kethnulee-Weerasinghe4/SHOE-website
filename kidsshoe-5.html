<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOE-kids</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header" id="header">
        <nav class="nav__container">
            <a href="#" class="nav__logo">SHOE</a>
            <div class="nav__menu" id="nav__menu">
                <ul class="nav__list">
                    <li>
                        <a href="index.html" class="link">Home</a>
                    </li>
                    <li>
                        <a href="about.html" class="link">About</a>
                    </li>
                    <li>
                        <a href="shop.html" class="link">Shop All</a>
                    </li>
                    <li>
                        <a href="#" class="link" onclick="openCart()">Cart</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main">

        <section class="product__detail">
            <div class="product__detail__container">
                <div class="product__image">
                    <img src="assets/kids-4.avif" alt="Speedcat OG">
                </div>
                <div class="product__info">
                    <h1>Basket Bow</h1>
                    <h2>LKR 11,000</h2>

                    <div class="options">
                        <div class="size">
                            <label>Size:</label>
                            <select id="size">
                                <option>28</option>
                                <option>29</option>
                                <option>30</option>
                                <option>31</option>
                                <option>32</option>
                            </select>
                        </div>

                        <div class="quanity">
                            <label>Quantity:</label>
                            <input type="number" id="quantity" value="1" min="1">
                        </div>
                    </div>
                    <button class="add__cart" id="addToCart">Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <nav class="footer__container">
            <div class="footer__brand">
                <a href="#" class="footer__logo">SHOE</a>
                <p class="footer__slogan">
                    Discover the perfect pair that matches your style, your energy,
                    and every step of your journey.
                </p>
            </div>
            <div class="footer__menu">
                <ul class="footer__list">
                    <li><a href="#" class="footer__link">Hotline</a></li>
                    <li><a href="#" class="footer__link">Email</a></li>
                    <li><a href="#" class="footer__link">Fax</a></li>
                    <li><a href="#" class="footer__link">Store Visit</a></li>
                </ul>
            </div>
        </nav>
        <div class="footer__bottom">
            <p>© 2026 SHOE. All rights reserved.</p>
        </div>
    </footer>

    <div class="cart__sidebar" id="cartSidebar">
        <div class="cart__header">
            <h2>Cart</h2>
            <button id="closeCart">✕</button>
        </div>
        <div class="cart__items" id="cartItems"></div>
        <div class="cart__footer">
            <h3>Total: <span id="cartTotal">LKR 0</span></h3>
            <button class="checkout">Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
